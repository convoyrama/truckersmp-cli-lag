name: Feature request
description: Suggest an improvement for truckersmp-cli-community
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
      placeholder: It is hard to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches?
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Extra context
      description: Screenshots, logs, links, or related issues.
    validations:
      required: false
