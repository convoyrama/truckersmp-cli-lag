name: TruckersMP CLI Lag Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish as a GitHub Release?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build Engine Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt -q update
          sudo apt -q install --no-install-recommends gcc-mingw-w64-x86-64

      - name: Build injector and completions
        run: make

      - name: Strip binary
        run: x86_64-w64-mingw32-strip truckersmp_cli/truckersmp-cli.exe

      - name: Create Release Package
        run: |
          VERSION=$(cat RELEASE)
          PKG_NAME="truckersmp-cli-lag-$VERSION"
          mkdir -p $PKG_NAME
          
          # Copy essential engine files
          cp -r truckersmp_cli $PKG_NAME/
          cp truckersmp-cli $PKG_NAME/
          cp _truckersmp-cli $PKG_NAME/
          cp truckersmp-cli.bash $PKG_NAME/
          cp README.md $PKG_NAME/
          cp LICENSE $PKG_NAME/
          cp RELEASE $PKG_NAME/
          
          tar -czvf truckersmp-cli-lag.tar.gz $PKG_NAME/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: truckersmp-cli-lag-package
          path: truckersmp-cli-lag.tar.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.publish_release == 'true' && (vars.RELEASE_VERSION || '0.10.0') || github.ref_name }}
          name: TruckersMP CLI Lag ${{ github.ref_name || format('v{0}', '0.10.0') }}
          files: truckersmp-cli-lag.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
