name: TruckersMP CLI Lag Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish as a GitHub Release?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build Engine Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt -q update
          sudo apt -q install --no-install-recommends gcc-mingw-w64-x86-64

      - name: Build injector and completions
        run: make

      - name: Strip binary
        run: x86_64-w64-mingw32-strip truckersmp_cli/truckersmp-cli.exe

      - name: Create Release Package
        id: package
        run: |
          VERSION=$(cat RELEASE)
          PKG_NAME="truckersmp-cli-lag-v$VERSION"
          FILE_NAME="$PKG_NAME.tar.gz"
          mkdir -p $PKG_NAME
          
          # Copy essential engine files
          cp -r truckersmp_cli $PKG_NAME/
          cp truckersmp-cli $PKG_NAME/
          cp _truckersmp-cli $PKG_NAME/
          cp truckersmp-cli.bash $PKG_NAME/
          cp README.md $PKG_NAME/
          cp LICENSE $PKG_NAME/
          cp RELEASE $PKG_NAME/
          
          tar -czvf $FILE_NAME $PKG_NAME/
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "filename=$FILE_NAME" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.filename }}
          path: ${{ steps.package.outputs.filename }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package.outputs.version }}
          name: TruckersMP CLI Lag v${{ steps.package.outputs.version }}
          files: ${{ steps.package.outputs.filename }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
